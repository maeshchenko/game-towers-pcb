    <style>
      html,body{margin:0;height:100%;background:#0b1611;overflow:hidden}
      /* Boot splash: shown while the JS bundle loads and Pixi initializes; removed by boot(). */
      #pcb-loading{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:#0b1611;color:#2bd06a;font-family:'JetBrains Mono',Menlo,Consolas,monospace}
      #pcb-loading .t{font-size:26px;letter-spacing:10px;text-shadow:0 0 12px rgba(43,208,106,.7)}
      #pcb-loading .s{font-size:10px;letter-spacing:3px;color:#6f8f7e;animation:pcbBlink 1.2s steps(2) infinite}
      #pcb-loading .trace{width:180px;height:2px;background:#123322;position:relative;overflow:hidden;border-radius:1px}
      #pcb-loading .trace::after{content:'';position:absolute;top:0;left:-40%;width:40%;height:100%;background:linear-gradient(90deg,transparent,#2bd06a);animation:pcbTrace 1.1s linear infinite}
      @keyframes pcbTrace{to{left:100%}}
      @keyframes pcbBlink{50%{opacity:.25}}
    </style>
  </head>
  <body>
    <div id="game-container"><div id="app"></div></div>
    <div id="pcb-loading"><div class="t">PCB&nbsp;TD</div><div class="trace"></div><div class="s">POWER-ON SELF TEST…</div></div>
    <noscript><div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0b1611;color:#2bd06a;font-family:monospace">JavaScript is required to play PCB TD.</div></noscript>
